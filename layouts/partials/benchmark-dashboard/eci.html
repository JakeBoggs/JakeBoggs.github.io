<div class="benchmarks-dashboard" data-benchmark-dashboard>

          <span class="dashboard-panel__meta" data-eci-meta></span>

          <a class="dashboard-source-link" data-eci-source-link href="https://epoch.ai/eci" target="_blank" rel="noopener" aria-label="View source" title="View source">

              <path d="M15 3h6v6"/>

<div class="benchmarks-dashboard" data-benchmark-dashboard>
  <div class="benchmarks-dashboard__inner">
    <p class="dashboard-status" data-dashboard-status>Loading benchmark dataset&hellip;</p>

    <div class="dashboard-controls-shell" data-dashboard-controls-shell>
      <div class="dashboard-controls" aria-label="Benchmark dashboard filters">
        <div class="dashboard-control">
          <label for="benchmark-filter">Benchmark</label>
          <select id="benchmark-filter" data-filter="benchmark"></select>
        </div>
        <div class="dashboard-control">
          <label for="category-filter">Category</label>
          <select id="category-filter" data-filter="category"></select>
        </div>
        <div class="dashboard-control">
          <label for="lab-filter">Lab</label>
          <select id="lab-filter" data-filter="lab"></select>
        </div>
        <div class="dashboard-control">
          <label for="openness-filter">Weights</label>
          <select id="openness-filter" data-filter="openness">
            <option value="">All</option>
            <option value="open">Open</option>
            <option value="closed">Closed</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</div>
